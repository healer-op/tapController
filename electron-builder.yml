appId: com.tapcontroller.app
productName: TapController
copyright: Copyright © 2026

directories:
  output: dist
  buildResources: src/assets

files:
  - package.json
  - main.js
  - preload.js
  - src/**/*
  - "!src/phone/**/*.map"

win:
  artifactName: "tapController-setup-${version}.${ext}"
  target:
    - target: nsis
      arch: x64
  icon: src/assets/icologo.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

extraResources:
  - from: node_modules/cloudflared/bin
    to: bin
    filter:
      - "**/*"
  - from: tools
    to: tools

publish:
  provider: github
  owner: healer-op
  repo: tapController
