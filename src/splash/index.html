<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }

    .logo {
      width: 80%;
      max-width: 400px;
      height: auto;
      object-fit: contain;
      animation: logoFadeIn 0.8s ease-out both;
      filter: drop-shadow(0 0 20px rgba(124, 106, 247, 0.4));
    }

    @keyframes logoFadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <img src="../assets/logo.png" class="logo" alt="TapController">
</body>
</html>
